# My first practice workflow with buttons
name: first

on:
  push:
    branches:
      -main

jobs:
  job1:
    name: First Job
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        uses: actions/checkout@v4
      - name: Step 2
        run: env | sort
        
        
  job2:
    name: Second Job
    runs-on: windows-latest
    steps:
      - name: Step 1
        uses: actions/checkout@v4
      - name: Step 2
        run: "Get-ChildItem Env: | Sort-Object Name"

  job3:
    name: Third Job
    needs: [job1, job2]
    runs-on: macos-latest
    steps:
      - name: Step 1
        uses: actions/checkout@v4
      - name: Step 2
        run: env | sort